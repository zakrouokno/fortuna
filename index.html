<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SLOT SYSTEM PRO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #0f1123 0%, #030407 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100vw;
            max-width: 420px;
            height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-top: 10px;
            width: 100%;
        }

        .header .system-title {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #9451ff 0%, #00f0ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
            margin-bottom: 5px;
        }

        .header h2 {
            font-size: 16px;
            font-weight: 700;
            color: #8fa0ba;
            letter-spacing: 0.5px;
        }

        /* КАЗИНО СЛОТ-МАШИНА */
        .slot-machine {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 20px 12px;
            background: rgba(15, 17, 28, 0.6);
            border: 2px solid rgba(148, 81, 255, 0.15);
            border-radius: 24px;
            box-shadow: 
                0 30px 70px rgba(0, 0, 0, 0.9),
                inset 0 0 40px rgba(148, 81, 255, 0.05);
            margin: auto 0;
        }

        /* Маркер центральной выигрышной линии */
        .slot-machine::before {
            content: '▼';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            color: #00f0ff;
            font-size: 14px;
            text-shadow: 0 0 10px #00f0ff;
            z-index: 10;
        }

        /* Вертикальный барабан */
        .reel-window {
            flex: 1;
            height: 140px;
            background: #07080e;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.8), inset 0 -10px 20px rgba(0,0,0,0.8);
        }

        .reel-window.active-win {
            border: 1.5px solid #00f0ff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2), inset 0 0 15px rgba(0, 240, 255, 0.1);
        }

        .reel-strip {
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            transition: transform 0s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        /* Элемент внутри слота */
        .slot-icon {
            height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10px;
        }

        .slot-icon .symbol {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 0%, #a5afc2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .slot-icon .label {
            font-size: 10px;
            font-weight: 800;
            color: #4f5666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Подсветка джекпотных символов */
        .slot-icon.jackpot .symbol {
            background: linear-gradient(135deg, #00f0ff 0%, #0077ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(0, 240, 255, 0.5);
        }

        .slot-icon.jackpot .label {
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        /* КНОПКА ЗАПУСКА КАЗИНО-АППАРАТА */
        #spin-btn {
            width: 100%;
            padding: 22px;
            background: linear-gradient(180deg, #231d42 0%, #110e22 100%);
            border: 2px solid #9451ff;
            border-radius: 18px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 20px rgba(148, 81, 255, 0.15);
            transition: all 0.2s ease;
        }

        #spin-btn:not(:disabled):hover {
            background: linear-gradient(180deg, #2f2759 0%, #181430 100%);
            border-color: #00f0ff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 25px rgba(0, 240, 255, 0.25);
            color: #00f0ff;
        }

        #spin-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: rgba(148, 81, 255, 0.1);
        }

        /* Дополнительное меню снизу */
        .bottom-nav {
            width: 100%;
            display: flex;
            gap: 10px;
        }

        .nav-tab {
            flex: 1;
            padding: 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            color: #4b5161;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-tab.active {
            background: rgba(148, 81, 255, 0.04);
            border-color: rgba(148, 81, 255, 0.15);
            color: #9451ff;
        }

        /* Премиальная модалка выигрыша */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 4, 7, 0.98);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .modal-content {
            background: radial-gradient(circle at top, #14172e 0%, #05060a 100%);
            border: 1px solid rgba(0, 240, 255, 0.25);
            padding: 45px 24px;
            border-radius: 24px;
            text-align: center;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.15);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal.show { display: flex; }
        .modal.show .modal-content { transform: translateY(0); }

        .modal-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 900;
            background: rgba(0, 240, 255, 0.05);
            color: #00f0ff;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            letter-spacing: 1.5px;
            border: 1px solid rgba(0, 240, 255, 0.15);
            text-transform: uppercase;
        }

        .modal h2 {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .prize-display {
            background: #06070c;
            border: 1px solid rgba(255, 255, 255, 0.02);
            padding: 26px 14px;
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
        }

        #prize-text {
            font-size: 17px;
            color: #00f0ff;
            font-weight: 700;
            line-height: 1.4;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
            text-transform: uppercase;
        }

        .modal-desc {
            font-size: 12px;
            color: #535a6e;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        #claim-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(180deg, #00f0ff 0%, #0055ff 100%);
            border: none;
            border-radius: 14px;
            color: #000000;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(0, 240, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="system-title">SLOT SYSTEM</div>
            <h2>Ваш бонус готовий до роздачі!</h2>
        </div>

        <div class="slot-machine">
            <div class="reel-window" id="window-0">
                <div class="reel-strip" id="reel-0"></div>
            </div>
            <div class="reel-window" id="window-1">
                <div class="reel-strip" id="reel-1"></div>
            </div>
            <div class="reel-window" id="window-2">
                <div class="reel-strip" id="reel-2"></div>
            </div>
        </div>

        <button id="spin-btn">Крутити барабан і отримати бонус</button>

        <div class="bottom-nav">
            <div class="nav-tab active">Список призів</div>
            <div class="nav-tab">Історія ваших бонусів</div>
        </div>
    </div>

    <div id="win-modal" class="modal">
        <div class="modal-content">
            <div class="modal-badge">Система бонусів</div>
            <h2>ВИГРАШ СФОРМОВАНО</h2>
            <div class="prize-display">
                <p id="prize-text">ГЕНЕРАЦІЯ...</p>
            </div>
            <p class="modal-desc">Даний бонус успішно прикріплено до вашого Telegram ID. Поспішайте активувати його на сайті казино.</p>
            <button id="claim-btn">Отримати бонус</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const spinBtn = document.getElementById('spin-btn');
        const modal = document.getElementById('win-modal');
        const prizeText = document.getElementById('prize-text');
        const claimBtn = document.getElementById('claim-btn');

        const pool = [
            { symbol: "%", label: "% до депозиту" },
            { symbol: "ФС", label: "Безкоштовні спіни" },
            { symbol: "+", label: "% на депозит" },
            { symbol: "777", label: "БЕЗДЕПИ" }
        ];

        const prizes = [
            "250 ФС + 200% БОНУС",
            "50 БЕЗКОШТОВНИХ СПІНІВ",
            "150% НА ПЕРШИЙ ДЕПОЗИТ",
            "100 БЕЗКОШТОВНИХ СПІНІВ",
            "VIP ПРОМОКОД НА БЕЗДЕП",
            "30 БЕЗКОШТОВНИХ СПІНІВ"
        ];

        const itemHeight = 140;
        const totalItemsInStrip = 30;

        function createReels() {
            for (let r = 0; r < 3; r++) {
                const strip = document.getElementById(`reel-${r}`);
                let html = '';
                for (let i = 0; i < totalItemsInStrip; i++) {
                    const item = pool[i % pool.length];
                    const isJackpot = item.symbol === "777" ? 'jackpot' : '';
                    html += `
                        <div class="slot-icon ${isJackpot}">
                            <div class="symbol">${item.symbol}</div>
                            <div class="label">${item.label}</div>
                        </div>
                    `;
                }
                strip.innerHTML = html;
            }
        }

        let isSpinning = false;
        let selectedPrize = "";

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;

            const prizeIndex = Math.floor(Math.random() * prizes.length);
            selectedPrize = prizes[prizeIndex];

            let targetSymbol = "ФС";
            if (selectedPrize.includes("БЕЗДЕП") || selectedPrize.includes("VIP")) targetSymbol = "777";
            else if (selectedPrize.includes("200%")) targetSymbol = "%";
            else if (selectedPrize.includes("150%")) targetSymbol = "+";

            const targetIndex = pool.findIndex(p => p.symbol === targetSymbol);

            for (let r = 0; r < 3; r++) {
                const strip = document.getElementById(`reel-${r}`);
                const windowEl = document.getElementById(`window-${r}`);
                
                windowEl.classList.remove('active-win');
                strip.style.transition = 'none';
                strip.style.transform = 'translateY(0px)';

                strip.offsetHeight;

                const finalStopIndex = (totalItemsInStrip - 4) + targetIndex; 
                const travelDistance = finalStopIndex * itemHeight;

                const duration = 3 + (r * 0.8); 
                strip.style.transition = `transform ${duration}s cubic-bezier(0.1, 0.9, 0.2, 1)`;
                strip.style.transform = `translateY(-${travelDistance}px)`;

                setTimeout(() => {
                    windowEl.classList.add('active-win');
                }, duration * 1000);
            }

            setTimeout(() => {
                prizeText.innerText = selectedPrize;
                modal.classList.add('show');
            }, 5000);
        });

        claimBtn.addEventListener('click', () => {
            tg.sendData(selectedPrize); 
            tg.close(); 
        });

        createReels();
    </script>
</body>
</html>
