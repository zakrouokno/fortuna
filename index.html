<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite 3D Fortuna</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #1b1437 0%, #05040a 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100vw;
            max-width: 420px;
            height: 100vh;
            padding: 30px 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            perspective: 1200px;
        }

        /* Хедер */
        .header {
            text-align: center;
            margin-top: 10px;
            width: 100%;
        }

        .brand-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #00f0ff;
            background: rgba(0, 240, 255, 0.06);
            border: 1px solid rgba(0, 240, 255, 0.2);
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 14px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
        }

        .header h1 {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
            background: linear-gradient(180deg, #ffffff 0%, #a5afc2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ТРЁХМЕРНАЯ СЦЕНА КРУЧЕНИЯ */
        .wheel-stage {
            position: relative;
            width: 330px;
            height: 330px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto 0;
            transform: rotateX(24deg) rotateY(-4deg);
            transform-style: preserve-3d;
        }

        /* Лютый неоновый 3D маркер */
        .pointer-3d {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%) translateZ(40px);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 24px solid #ff0055;
            filter: drop-shadow(0 0 10px #ff0055);
            z-index: 100;
        }

        /* Обод колеса со светящимися диодами */
        .wheel-outer-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #111319;
            border: 6px solid #222630;
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.8),
                0 0 40px rgba(127, 0, 255, 0.15),
                inset 0 0 30px rgba(0, 0, 0, 0.8);
            transform-style: preserve-3d;
        }

        /* Само 3D колесо на CSS-слоях (без Canvas) */
        .wheel-plate {
            position: absolute;
            width: calc(100% - 12px);
            height: calc(100% - 12px);
            border-radius: 50%;
            overflow: hidden;
            background: #090a0d;
            transition: transform 5s cubic-bezier(0.1, 0.85, 0.25, 1);
            transform: translateZ(5px);
        }

        /* Линии секторов */
        .sector-line {
            position: absolute;
            width: 2px;
            height: 50%;
            background: linear-gradient(to top, rgba(34, 38, 48, 0.8), rgba(0, 240, 255, 0.2));
            left: calc(50% - 1px);
            top: 0;
            transform-origin: bottom center;
        }

        /* Текст секторов (идеально ровный и горизонтальный) */
        .sector-text {
            position: absolute;
            width: 130px;
            height: 40px;
            left: calc(50% - 65px);
            top: 35px;
            transform-origin: center 125px;
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: #8fa0ba;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }

        /* Подсветка топовых призов */
        .sector-text.neon-cyan {
            color: #00f0ff;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
        }

        /* Массивная 3D кнопка START, выдающаяся вперед */
        #spin-btn {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #cfd4dc 40%, #858b96 100%);
            border: 4px solid #161820;
            border-radius: 50%;
            color: #090a0e;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 1px;
            cursor: pointer;
            z-index: 50;
            transform: translateZ(30px);
            box-shadow: 
                0 15px 25px rgba(0,0,0,0.6), 
                0 0 20px rgba(255,255,255,0.15),
                inset 0 -4px 6px rgba(0,0,0,0.4);
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #spin-btn:active {
            transform: translateZ(15px) scale(0.94);
            box-shadow: 0 5px 12px rgba(0,0,0,0.6);
        }

        .footer-note {
            font-size: 11px;
            color: #4b4f63;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Премиум Модалка выигрыша */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(4, 3, 8, 0.98);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .modal-content {
            background: radial-gradient(circle at top, #1e1938 0%, #07060b 100%);
            border: 1px solid rgba(0, 240, 255, 0.35);
            padding: 45px 24px;
            border-radius: 24px;
            text-align: center;
            max-width: 350px;
            width: 100%;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.15);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal.show { display: flex; }
        .modal.show .modal-content { transform: translateY(0); }

        .modal-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 900;
            background: rgba(0, 240, 255, 0.08);
            color: #00f0ff;
            padding: 5px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            letter-spacing: 1.5px;
            border: 1px solid rgba(0, 240, 255, 0.15);
        }

        .modal h2 {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .prize-display {
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 24px 14px;
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
        }

        #prize-text {
            font-size: 16px;
            color: #00f0ff;
            font-weight: 700;
            line-height: 1.4;
            text-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
        }

        .modal-desc {
            font-size: 12px;
            color: #585d70;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        #claim-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(180deg, #00f0ff 0%, #0066ff 100%);
            border: none;
            border-radius: 12px;
            color: #000000;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(0, 240, 255, 0.35);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="brand-badge">PREMIUM SYSTEM</div>
            <h1>КОЛЕСО ФОРТУНИ</h1>
        </div>

        <div class="wheel-stage">
            <div class="pointer-3d"></div>
            <div class="wheel-outer-ring">
                <div class="wheel-plate" id="wheel-plate">
                    </div>
            </div>
            <button id="spin-btn">START</button>
        </div>

        <div class="footer-note">
            Обертайте барабан та вигравайте
        </div>
    </div>

    <div id="win-modal" class="modal">
        <div class="modal-content">
            <div class="modal-badge">ГЕНЕРАЦІЯ БОНУСУ</div>
            <h2>ВАШ ПРИЗ ЗГЕНЕРОВАНО!</h2>
            <div class="prize-display">
                <p id="prize-text">ЗАВАНТАЖЕННЯ...</p>
            </div>
            <p class="modal-desc">Даний бонус успішно прикріплено до вашого Telegram ID. Поспішайте активувати його на сайті.</p>
            <button id="claim-btn">🚀 ЗАБРАТИ БОНУС</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const wheelPlate = document.getElementById('wheel-plate');
        const spinBtn = document.getElementById('spin-btn');
        const modal = document.getElementById('win-modal');
        const prizeText = document.getElementById('prize-text');
        const claimBtn = document.getElementById('claim-btn');

        const prizes = [
            "250 ФС + 200% БОНУС",
            "50 БЕЗКОШТОВНИХ СПІНІВ",
            "150% НА ПЕРШИЙ ДЕПОЗИТ",
            "100 БЕЗКОШТОВНИХ СПІНІВ",
            "VIP ПРОМОКОД НА БЕЗДЕП",
            "30 БЕЗКОШТОВНИХ СПІНІВ"
        ];

        const numSectors = prizes.length;
        const degreesPerSector = 360 / numSectors;

        function initWheel() {
            for (let i = 0; i < numSectors; i++) {
                const rotation = i * degreesPerSector;
                
                const line = document.createElement('div');
                line.className = 'sector-line';
                line.style.transform = `rotate(${rotation}deg)`;
                wheelPlate.appendChild(line);

                const textDiv = document.createElement('div');
                const textRotation = rotation + (degreesPerSector / 2);
                
                if (prizes[i].includes("250 ФС") || prizes[i].includes("VIP")) {
                    textDiv.className = 'sector-text neon-cyan';
                } else {
                    textDiv.className = 'sector-text';
                }
                
                textDiv.style.transform = `rotate(${textRotation}deg)`;
                textDiv.innerText = prizes[i];
                wheelPlate.appendChild(textDiv);
            }
        }

        let currentRotation = 0;
        let isSpinning = false;
        let selectedPrize = "";

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;

            spinBtn.style.opacity = '0.3';
            spinBtn.style.pointerEvents = 'none';

            // ПОВНИЙ ЧЕСНИЙ РАНДОМ СЕКТОРІВ
            const randomSectorIndex = Math.floor(Math.random() * numSectors);
            selectedPrize = prizes[randomSectorIndex];

            const targetSectorCenter = (randomSectorIndex * degreesPerSector) + (degreesPerSector / 2);
            const targetRotation = 360 - targetSectorCenter;

            const additionalRotation = 1800 + targetRotation - (currentRotation % 360);
            currentRotation += additionalRotation;

            wheelPlate.style.transform = `translateZ(5px) rotate(${currentRotation}deg)`;

            setTimeout(() => {
                prizeText.innerText = selectedPrize.toUpperCase();
                modal.classList.add('show');
            }, 5100);
        });

        claimBtn.addEventListener('click', () => {
            tg.sendData(selectedPrize); 
            tg.close(); 
        });

        initWheel();
    </script>
</body>
</html>
