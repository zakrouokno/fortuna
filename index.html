<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Fortuna Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2 family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at center, #18122b 0%, #060409 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100vw;
            max-width: 420px;
            height: 100vh;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            perspective: 1000px; /* Включаем 3D перспективу для всего экрана */
        }

        /* Хедер */
        .header {
            text-align: center;
            margin-top: 10px;
            width: 100%;
        }

        .brand-badge {
            display: inline-block;
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 2.5px;
            color: #00f0ff;
            background: rgba(0, 240, 255, 0.07);
            border: 1px solid rgba(0, 240, 255, 0.2);
            padding: 5px 14px;
            border-radius: 20px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        /* ТРЁХМЕРНЫЙ КОНТЕЙНЕР ДЛЯ КОЛЕСА */
        .wheel-3d-stage {
            position: relative;
            width: 340px;
            height: 340px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto 0;
            transform: rotateX(20deg); /* Наклоняем колесо от зрителя для эффекта 3D глубины */
            transform-style: preserve-3d;
        }

        /* Кастомный неоновый 3D маркер сверху */
        .pointer-3d {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%) translateZ(30px); /* Выносим маркер вперед в 3D пространстве */
            width: 6px;
            height: 24px;
            background: linear-gradient(180deg, #ff0055, #990033);
            box-shadow: 0 0 15px #ff0055, 0 5px 10px rgba(0,0,0,0.5);
            z-index: 100;
            border-radius: 3px;
        }

        /* Само колесо (Canvas) с поддержкой объёмных теней */
        #wheel {
            border-radius: 50%;
            background-color: #0d0e12;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.8),
                0 0 30px rgba(127, 0, 255, 0.2),
                inset 0 0 20px rgba(0, 0, 0, 0.9);
            transition: transform 5s cubic-bezier(0.15, 0.85, 0.2, 1); /* Нативное плавное торможение */
            transform: translateZ(0);
        }

        /* Объёмная парящая кнопка START по центру */
        #spin-btn {
            position: absolute;
            width: 76px;
            height: 76px;
            background: radial-gradient(circle at 35% 35%, #ffffff 0%, #d1d5db 50%, #9ca3af 100%);
            border: 4px solid #111317;
            border-radius: 50%;
            color: #0a0b0d;
            font-weight: 900;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
            z-index: 50;
            /* Выдавливаем кнопку на 25px вперед на зрителя */
            transform: translateZ(25px); 
            box-shadow: 
                0 10px 20px rgba(0,0,0,0.6), 
                0 0 15px rgba(255,255,255,0.2),
                inset 0 -3px 5px rgba(0,0,0,0.3);
            transition: all 0.15s ease;
        }

        #spin-btn:active {
            transform: translateZ(10px) scale(0.95);
            box-shadow: 0 5px 10px rgba(0,0,0,0.6);
        }

        /* Нижний блок */
        .footer-note {
            font-size: 11px;
            color: #4b4f63;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Модалка выигрыша */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 4, 10, 0.98);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .modal-content {
            background: radial-gradient(circle at top, #1f1a3a 0%, #08060c 100%);
            border: 1px solid rgba(0, 240, 255, 0.3);
            padding: 45px 24px;
            border-radius: 24px;
            text-align: center;
            max-width: 350px;
            width: 100%;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.15);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal.show { display: flex; }
        .modal.show .modal-content { transform: translateY(0); }

        .modal-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 900;
            background: rgba(0, 240, 255, 0.08);
            color: #00f0ff;
            padding: 5px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            letter-spacing: 1.5px;
            border: 1px solid rgba(0, 240, 255, 0.15);
        }

        .modal h2 {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 20px;
        }

        .prize-display {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 24px 14px;
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
        }

        #prize-text {
            font-size: 16px;
            color: #00f0ff;
            font-weight: 700;
            line-height: 1.4;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .modal-desc {
            font-size: 12px;
            color: #585d70;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        #claim-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(180deg, #00f0ff 0%, #0077ff 100%);
            border: none;
            border-radius: 12px;
            color: #000000;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(0, 240, 255, 0.35);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="brand-badge">PREMIUM SYSTEM</div>
            <h1>КОЛЕСО ФОРТУНИ</h1>
        </div>

        <!-- 3D Сцена с колесом -->
        <div class="wheel-3d-stage">
            <div class="pointer-3d"></div>
            <canvas id="wheel" width="340" height="340"></canvas>
            <button id="spin-btn">START</button>
        </div>

        <div class="footer-note">
            Обертайте барабан та вигравайте
        </div>
    </div>

    <!-- Модалка выигрыша -->
    <div id="win-modal" class="modal">
        <div class="modal-content">
            <div class="modal-badge">ВИТЯГ З СИСТЕМИ</div>
            <h2>ВАШ ПРИЗ ЗГЕНЕРОВАНО!</h2>
            <div class="prize-display">
                <p id="prize-text">ЗАВАНТАЖЕННЯ...</p>
            </div>
            <p class="modal-desc">Даний бонус успішно прикріплено до вашого Telegram ID. Поспішайте активувати його на сайті.</p>
            <button id="claim-btn">🚀 ЗАБРАТИ БОНУС</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
