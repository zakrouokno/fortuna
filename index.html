<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Promo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: linear-gradient(180deg, #0f1225 0%, #060711 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100vw;
            max-width: 420px;
            height: 100vh;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        /* Хедер */
        .header {
            text-align: center;
            margin-top: 10px;
            width: 100%;
        }

        .brand-logo {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 1.5px;
            color: #ffffff;
            margin-bottom: 25px;
        }

        .brand-logo span {
            color: #00ffcc;
            margin-left: 4px;
        }

        .header h2 {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.4;
            padding: 0 20px;
        }

        /* Контейнер с карточками */
        .promo-slider {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: auto 0;
        }

        .pointer-arrow {
            font-size: 24px;
            color: #00f0ff;
            margin-bottom: 16px;
            text-shadow: 0 0 10px #00f0ff;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .cards-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        /* Стили карточек */
        .promo-card {
            position: relative;
            flex: 1;
            height: 160px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding: 16px 4px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.25s ease;
            overflow: hidden;
            opacity: 0.4;
            transform: scale(0.9);
        }

        .card-purple { background: linear-gradient(180deg, #2b113a 0%, #160720 100%); }
        .card-green { background: linear-gradient(180deg, #123524 0%, #071910 100%); }
        .card-blue { background: linear-gradient(180deg, #112046 0%, #070e24 100%); }

        .promo-card.active {
            opacity: 1;
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .card-purple.active { border-color: #d900ff; box-shadow: 0 0 15px rgba(217, 0, 255, 0.2); }
        .card-green.active { border-color: #00ffcc; box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); }
        .card-blue.active { border-color: #0066ff; box-shadow: 0 0 15px rgba(0, 102, 255, 0.2); }

        .card-icon-wrap {
            margin-bottom: auto;
            margin-top: 15px;
            transition: transform 0.25s;
        }

        .promo-card.active .card-icon-wrap {
            transform: scale(1.1);
        }

        .fake-3d-icon {
            font-size: 32px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
        }

        .card-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.3px;
            text-align: center;
            color: #e2e4e9;
        }

        /* Кнопка и меню внизу */
        .controls-block {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 10px;
        }

        #spin-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #1c4e3d 0%, #113327 100%);
            border: 1px solid #00ffcc;
            border-radius: 10px;
            color: #00ffcc;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.15);
            transition: all 0.2s ease;
        }

        #spin-btn:active {
            transform: scale(0.98);
            background: #00ffcc;
            color: #000000;
            box-shadow: 0 0 25px #00ffcc;
        }

        .tabs-menu {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 4px;
            width: 100%;
        }

        .tab-item {
            flex: 1;
            text-align: center;
            padding: 12px;
            font-size: 12px;
            font-weight: 600;
            color: #6d7385;
            border-radius: 6px;
        }

        .tab-item.active {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 6, 12, 0.98);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .modal-content {
            background: #0f1225;
            border: 1px solid rgba(0, 255, 204, 0.3);
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.1);
        }

        .modal.show { display: flex; }

        .modal-badge {
            display: inline-block;
            font-size: 9px;
            font-weight: 800;
            background: rgba(0, 255, 204, 0.1);
            color: #00ffcc;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .modal h2 {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .prize-display {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px 12px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        #prize-text {
            font-size: 16px;
            color: #00ffcc;
            font-weight: 700;
            line-height: 1.4;
        }

        .modal-desc {
            font-size: 12px;
            color: #6d7385;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        #claim-btn {
            width: 100%;
            padding: 16px;
            background: #00ffcc;
            border: none;
            border-radius: 10px;
            color: #000000;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 255, 204, 0.3);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="brand-logo">SYSTEM<span>PROMO</span></div>
            <h2>Ваш бонус готовий до роздачі!</h2>
        </div>

        <div class="promo-slider">
            <div class="pointer-arrow">▼</div>
            
            <div class="cards-container">
                <div class="promo-card card-purple" id="card-0">
                    <div class="card-icon-wrap">
                        <div class="fake-3d-icon">%</div>
                    </div>
                    <div class="card-title">% ДО ДЕПОЗИТУ</div>
                </div>

                <div class="promo-card card-green active" id="card-1">
                    <div class="card-icon-wrap">
                        <div class="fake-3d-icon">🎰</div>
                    </div>
                    <div class="card-title">БЕЗДЕПИ</div>
                </div>

                <div class="promo-card card-blue" id="card-2">
                    <div class="card-icon-wrap">
                        <div class="fake-3d-icon">+</div>
                    </div>
                    <div class="card-title">% НА ДЕПОЗИТ</div>
                </div>
            </div>
        </div>

        <div class="controls-block">
            <button id="spin-btn">КРУТИТИ БАРАБАН І ОТРИМАТИ БОНУС</button>
            
            <div class="tabs-menu">
                <div class="tab-item active">Список призів</div>
                <div class="tab-item">Історія бонусів</div>
            </div>
        </div>
    </div>

    <div id="win-modal" class="modal">
        <div class="modal-content">
            <div class="modal-badge">АКТИВАЦІЯ</div>
            <h2>БОНУС ЗГЕНЕРОВАНО!</h2>
            <div class="prize-display">
                <p id="prize-text">250 БЕЗКОШТОВНИХ СПІНІВ + 200% ДО ДЕПОЗИТУ</p>
            </div>
            <p class="modal-desc">Система закріпила цей промокод за вашим ID. Активація доступна протягом 30 хвилин.</p>
            <button id="claim-btn">🚀 ЗАБРАТИ БОНУС</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
