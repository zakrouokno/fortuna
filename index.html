<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Преміум Бонус</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="brand-badge">PREMIUM SYSTEM</div>
            <h1>ГЕНЕРАТОР БОНУСІВ</h1>
            <p class="subtitle">Ваш ID: <span id="user-id">Гість</span> • Доступ активовано</p>
        </div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel" width="360" height="360"></canvas>
            <button id="spin-btn">START</button>
        </div>

        <div class="footer-note">
            Натисніть START для запуску системи
        </div>
    </div>

    <div id="win-modal" class="modal">
        <div class="modal-content">
            <div class="success-icon">✓</div>
            <h2>БОНУС СФОРМОВАНО</h2>
            <div class="prize-box">
                <p id="prize-text">250 FREE SPINS + 200% BONUS</p>
            </div>
            <p class="modal-info">Приз успішно закріплено за вашим профілем та готовий до активації.</p>
            <button id="claim-btn">ОТРИМАТИ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
