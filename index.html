<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Завантаження системи...</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #030408;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 240, 255, 0.1);
            border-top: 3px solid #00f0ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p {
            font-size: 14px;
            color: #79859c;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Перехід на безпечну сторінку...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Твоя рефка на казино
        const casinoLink = "https://1casinowin.com/?refcode=68ee9add-a6e4-4cc3-b714-09930c4ff705&subid={{subid}}&clickid={{clickid}}&utm_source=tg&utm_medium=zakrouokno_-__(tt+tg)&utm_campaign=zakrouoknotg";

        // Отправляем в бот технический триггер, что переход совершён
        setTimeout(() => {
            tg.sendData("REDIRECT_SUCCESS");
            // Открываем казино прямо внутри или через браузер
            tg.openLink(casinoLink);
            tg.close();
        }, 350);
    </script>
</body>
</html>
